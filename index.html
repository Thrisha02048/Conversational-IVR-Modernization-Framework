<!DOCTYPE html>
<html>
<head>

<title>Hospital IVR Simulator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Hospital Visiting Hours & General Enquiry IVR</h2>

<div class="ivr-box">

<h3>Call Status</h3>

<div id="screen">

Press Start Call

</div>

<div class="call-buttons">

<button onclick="startCall()">Start Call</button>

<button onclick="endCall()">End Call</button>

</div>

<h3>Menu Options</h3>

<div class="menu-buttons">

<button onclick="pressKey('1')">1 Visiting Hours</button>

<button onclick="pressKey('2')">2 Doctors</button>

<button onclick="pressKey('3')">3 Address</button>

<button onclick="pressKey('4')">4 Contact</button>

<button onclick="pressKey('5')">5 Exit</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
