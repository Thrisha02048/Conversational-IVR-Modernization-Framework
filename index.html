<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IVR Phone UI</title>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

/* PHONE FRAME */
.phone{
  width:360px;
  height:720px;
  background:#000;
  border-radius:40px;
  padding:20px;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* TOP */
.top{
  text-align:center;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#444;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.name{
  font-size:22px;
  font-weight:bold;
}

.timer{
  color:gray;
}

/* MESSAGE */
.display{
  text-align:center;
  font-size:16px;
  padding:10px;
  min-height:80px;
}

/* INPUT */
.form{
  text-align:center;
}

input,select{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:15px;
  border:none;
  font-size:14px;
}

/* KEYPAD */
.keypad{
  text-align:center;
}

.keypad button{
  width:70px;
  height:70px;
  border-radius:50%;
  margin:8px;
  font-size:20px;
  background:#222;
  color:white;
}

/* CALL BUTTONS */
.actions{
  display:flex;
  justify-content:center;
  gap:30px;
}

.btn{
  width:70px;
  height:70px;
  border-radius:50%;
  font-size:20px;
  border:none;
}

.call{background:#22c55e;}
.end{background:#ef4444;}

#receipt{
  display:none;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="phone">

<!-- TOP -->
<div class="top">
  <div class="avatar">🏥</div>
  <div class="name">CarePlus Hospital</div>
  <div class="timer" id="timer">00:00</div>
</div>

<!-- TEXT -->
<div class="display" id="display">Incoming Call...</div>

<!-- FORM -->
<div class="form" id="form" style="display:none;">
  <input id="nameInput" placeholder="Enter Name">
  <input id="ageInput" type="number" placeholder="Enter Age">

  <select id="gender">
    <option value="">Gender</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <select id="symptom">
    <option value="">Select Symptom</option>
    <option>Chest Pain</option>
    <option>Bone Pain</option>
    <option>Headache</option>
    <option>Skin Issue</option>
    <option>Fever</option>
  </select>

  <button onclick="submitDetails()">Submit</button>
</div>

<!-- KEYPAD -->
<div class="keypad" id="keypad" style="display:none;">
  <button onclick="press(1)">1</button>
  <button onclick="press(2)">2</button>
  <button onclick="press(3)">3</button><br>
  <button onclick="press(4)">4</button>
  <button onclick="press(5)">5</button>
  <button onclick="press(6)">6</button>
</div>

<!-- RECEIPT -->
<div id="receipt"></div>

<!-- BUTTONS -->
<div class="actions">
  <button class="btn call" onclick="startCall()">📞</button>
  <button class="btn end" onclick="endCall()">❌</button>
</div>

</div>

<script>

let step=0;
let user={};
let seconds=0;
let timerInterval;

function startTimer(){
  timerInterval=setInterval(()=>{
    seconds++;
    let m=String(Math.floor(seconds/60)).padStart(2,'0');
    let s=String(seconds%60).padStart(2,'0');
    document.getElementById("timer").innerText=m+":"+s;
  },1000);
}

function speak(text){
  document.getElementById("display").innerText=text;
  let msg=new SpeechSynthesisUtterance(text);
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

const hospital={
1:{name:"Cardiology",docs:["Dr Arvind","Dr Meena"]},
2:{name:"Orthopedics",docs:["Dr Kavya","Dr Ramesh"]},
3:{name:"Neurology",docs:["Dr Iyer","Dr Rahul"]},
4:{name:"Dermatology",docs:["Dr Sneha","Dr Priya"]},
5:{name:"General",docs:["Dr Neha","Dr Amit"]},
6:{name:"Pediatrics",docs:["Dr Anjali","Dr Vivek"]}
};

function startCall(){
  startTimer();
  document.getElementById("form").style.display="block";
  speak("Welcome. Enter your details.");
}

function submitDetails(){
  let name=document.getElementById("nameInput").value.trim();
  let age=document.getElementById("ageInput").value.trim();
  let gender=document.getElementById("gender").value;
  let symptom=document.getElementById("symptom").value;

  if(!name||!age||!gender||!symptom){
    alert("Fill all details");
    return;
  }

  user={name,age,gender,symptom};

  form.style.display="none";
  keypad.style.display="block";

  speak("Hello "+name+". Press 1 Cardiology, 2 Orthopedics, 3 Neurology, 4 Dermatology, 5 General, 6 Pediatrics.");

  step=1;
}

function press(n){

  if(step===1){
    user.dept=hospital[n].name;
    user.docs=hospital[n].docs;
    speak("Press 1 for "+user.docs[0]+" or 2 for "+user.docs[1]);
    step=2; return;
  }

  if(step===2){
    user.doctor=user.docs[n-1];
    speak("Press 1 morning, 2 afternoon, 3 evening");
    step=3; return;
  }

  if(step===3){
    user.time=["9 AM","2 PM","6 PM"][n-1];
    speak("Press 1 to confirm");
    step=4; return;
  }

  if(step===4){
    keypad.style.display="none";
    receipt.style.display="block";

    receipt.innerHTML=`
    <h3>Confirmed</h3>
    ${user.name}<br>
    ${user.dept}<br>
    ${user.doctor}<br>
    ${user.time}<br>
    Duration: ${timer.innerText}
    `;

    speak("Appointment confirmed");
  }
}

function endCall(){
  clearInterval(timerInterval);
  location.reload();
}

</script>

</body>
