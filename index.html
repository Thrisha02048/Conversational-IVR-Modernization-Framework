<!DOCTYPE html>
<html>
<head>
<title>Hospital IVR</title>

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.phone {
  width:320px;
  height:640px;
  background:linear-gradient(to bottom,#000,#222);
  border-radius:40px;
  color:white;
  text-align:center;
  position:relative;
  overflow:hidden;
}


.incoming {
  margin-top:120px;
}

.call-buttons {
  position:absolute;
  bottom:60px;
  width:100%;
}

.circle {
  width:70px;
  height:70px;
  border-radius:50%;
  line-height:70px;
  font-size:26px;
  display:inline-block;
  margin:20px;
  cursor:pointer;
}

.green { background:#00c853; }
.red { background:#d50000; }

.hidden { display:none; }

.timer {
  margin-top:15px;
  color:#aaa;
}

.content {
  margin-top:30px;
}

input, select {
  width:85%;
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px;
  border-radius:20px;
  border:none;
  background:#28a745;
  color:white;
}
</style>
</head>

<body>

<div class="phone">

  <!-- Incoming Call -->
  <div id="incoming" class="incoming">
    <h2>📞 Incoming Call</h2>
    <p>CarePlus Hospital</p>

    <div class="call-buttons">
      <div class="circle green" onclick="acceptCall()">📞</div>
      <div class="circle red" onclick="endCall()">❌</div>
    </div>
  </div>

  <!-- IVR -->
  <div id="ivr" class="hidden">
    <h3 style="margin-top:20px;">Hospital IVR</h3>
    <div class="timer" id="timer">00:00</div>
    <div class="content" id="content"></div>

    <div class="call-buttons">
      <div class="circle red" onclick="endCall()">❌</div>
    </div>
  </div>

</div>

<script>

let step = 0;
let data = {};
let sec = 0;


function startTimer(){
  setInterval(()=>{
    sec++;
    let m = String(Math.floor(sec/60)).padStart(2,'0');
    let s = String(sec%60).padStart(2,'0');
    document.getElementById("timer").innerText = m+":"+s;
  },1000);
}


function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}


function acceptCall(){
  document.getElementById("incoming").classList.add("hidden");
  document.getElementById("ivr").classList.remove("hidden");

  startTimer();

  
  speak("Welcome to hospital IVR system");

  setTimeout(()=>{
    nextStep();
  },1500);
}


function endCall(){
  alert("Call Ended");
  location.reload();
}


function nextStep(){
  let c = document.getElementById("content");

  
  if(step===0){
    c.innerHTML = `
    <p>Enter Details</p>
    <input id="name" placeholder="Name">
    <input id="age" type="number" placeholder="Age">
    <select id="gender">
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>
    <input id="phone" placeholder="Phone Number">
    <button onclick="saveUser()">Next</button>
    `;
    speak("Please enter your details");
  }

 
  else if(step===1){
    c.innerHTML = `
    <p>Select Department</p>
    <select id="dept">
      <option>General Medicine</option>
      <option>Cardiology</option>
      <option>Dermatology</option>
      <option>Orthopedics</option>
      <option>Neurology</option>
      <option>Pediatrics</option>
    </select>
    <button onclick="saveDept()">Next</button>
    `;
    speak("Select department");
  }

  
  else if(step===2){
    c.innerHTML = `
    <p>Select Doctor</p>
    <select id="doctor">
      <option>Dr Priya - 5 yrs - Fever Specialist</option>
      <option>Dr Kumar - 7 yrs - General Physician</option>
      <option>Dr Rao - 10 yrs - Cardiologist</option>
      <option>Dr Meena - 8 yrs - Dermatologist</option>
      <option>Dr Arjun - 12 yrs - Neurologist</option>
      <option>Dr Kavya - 6 yrs - Pediatrician</option>
    </select>
    <button onclick="saveDoctor()">Next</button>
    `;
    speak("Select doctor");
  }

 
  else if(step===3){
    c.innerHTML = `
    <p>Select Time</p>
    <select id="time">
      <option value="">Choose Time</option>
      <option>10:00 AM</option>
      <option>11:30 AM</option>
      <option>2:00 PM</option>
      <option>4:00 PM</option>
    </select>
    <button onclick="confirmBooking()">Confirm</button>
    `;
    speak("Select appointment time");
  }

  
  else if(step===4){
    c.innerHTML = `
    <h3>✅ Appointment Confirmed</h3>
    <p><b>Name:</b> ${data.name}</p>
    <p><b>Doctor:</b> ${data.doctor}</p>
    <p><b>Time:</b> ${data.time}</p>
    `;
    speak("Your appointment is confirmed. Thank you");
  }
}


function saveUser(){
  let name = document.getElementById("name").value.trim();
  let age = document.getElementById("age").value.trim();
  let gender = document.getElementById("gender").value;
  let phone = document.getElementById("phone").value.trim();

  
  if(name==="" || age==="" || gender==="" || phone===""){
    alert("Please fill all fields");
    return;
  }

  data = {name, age, gender, phone};

  step++;
  nextStep();
}

function saveDept(){
  data.dept = document.getElementById("dept").value;
  step++;
  nextStep();
}


function saveDoctor(){
  data.doctor = document.getElementById("doctor").value;
  step++;
  nextStep();
}


function confirmBooking(){
  let time = document.getElementById("time").value;

  if(time===""){
    alert("Please select time");
    return;
  }

  data.time = time;

  step++;
  nextStep();
}

</script>

</body>
</html>
