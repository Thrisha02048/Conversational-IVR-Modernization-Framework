<!DOCTYPE html>
<html>
<head>
<title>Hospital IVR Call</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

.phone {
  width: 320px;
  height: 640px;
  background: linear-gradient(to bottom, #0a0a0a, #222);
  border-radius: 35px;
  color: white;
  text-align: center;
  padding: 20px;
  box-shadow: 0 0 25px black;
  position: relative;
}

.title {
  margin-top: 20px;
  font-size: 18px;
}

.timer {
  font-size: 14px;
  color: #aaa;
  margin: 5px;
}

.ivr-text {
  margin-top: 30px;
  min-height: 80px;
  font-size: 15px;
}

input, select {
  width: 85%;
  padding: 8px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 15px;
  margin: 10px;
  border-radius: 20px;
  border: none;
  background: #444;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #666;
}

.controls {
  position: absolute;
  bottom: 30px;
  width: 100%;
}

.call-btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  line-height: 65px;
  display: inline-block;
  margin: 10px;
  font-size: 22px;
}

.green { background: green; }
.red { background: red; }

.confirm {
  background: #1e7e34;
  padding: 10px;
  border-radius: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="phone">
  <div class="title">📞 CarePlus Hospital</div>
  <div class="timer" id="timer">00:00</div>

  <div class="ivr-text" id="text">Tap call to start</div>

  <div id="ui"></div>

  <div class="controls">
    <div class="call-btn green" onclick="startCall()">📞</div>
    <div class="call-btn red" onclick="endCall()">❌</div>
  </div>
</div>

<script>
let seconds = 0;
let interval;

// TIMER
function startTimer() {
  interval = setInterval(() => {
    seconds++;
    let m = String(Math.floor(seconds/60)).padStart(2,'0');
    let s = String(seconds%60).padStart(2,'0');
    document.getElementById("timer").innerText = m + ":" + s;
  },1000);
}

// SPEECH
function speak(text){
  let sp = new SpeechSynthesisUtterance(text);
  speechSynthesis.cancel();
  speechSynthesis.speak(sp);
}

// START CALL
function startCall(){
  startTimer();
  step1();
}

// END CALL
function endCall(){
  location.reload();
}

// STEP 1: USER DETAILS
function step1(){
  let t = "Welcome to CarePlus Hospital. Please enter your name and phone number.";
  document.getElementById("text").innerText = t;
  speak(t);

  document.getElementById("ui").innerHTML = `
    <input id="name" placeholder="Enter Name">
    <input id="phone" placeholder="Phone Number">
    <button onclick="step2()">Next</button>
  `;
}

// STEP 2: SYMPTOMS
function step2(){
  let t = "Please select your symptom.";
  document.getElementById("text").innerText = t;
  speak(t);

  document.getElementById("ui").innerHTML = `
    <select id="symptom">
      <option>Chest Pain</option>
      <option>Fever</option>
      <option>Skin Allergy</option>
      <option>Headache</option>
    </select>
    <button onclick="step3()">Next</button>
  `;
}

// STEP 3: DOCTORS
function step3(){
  let symptom = document.getElementById("symptom").value;
  let doctors = "";

  if(symptom=="Chest Pain"){
    doctors = `
    <option value="Dr. Rao (Cardiologist, 10 yrs)">Dr. Rao - Cardiologist (10 yrs)</option>
    <option value="Dr. Sharma (Cardiologist, 8 yrs)">Dr. Sharma - Cardiologist (8 yrs)</option>`;
  }
  else if(symptom=="Fever"){
    doctors = `
    <option value="Dr. Priya (General, 5 yrs)">Dr. Priya - General (5 yrs)</option>
    <option value="Dr. Kumar (General, 7 yrs)">Dr. Kumar - General (7 yrs)</option>`;
  }
  else if(symptom=="Skin Allergy"){
    doctors = `
    <option value="Dr. Meena (Dermatologist, 6 yrs)">Dr. Meena - Dermatologist (6 yrs)</option>
    <option value="Dr. John (Dermatologist, 9 yrs)">Dr. John - Dermatologist (9 yrs)</option>`;
  }
  else {
    doctors = `
    <option value="Dr. Arjun (Neurologist, 12 yrs)">Dr. Arjun - Neurologist (12 yrs)</option>
    <option value="Dr. Devi (Neurologist, 10 yrs)">Dr. Devi - Neurologist (10 yrs)</option>`;
  }

  let t = "Please select your doctor.";
  document.getElementById("text").innerText = t;
  speak(t);

  document.getElementById("ui").innerHTML = `
    <select id="doctor">${doctors}</select>
    <button onclick="step4()">Next</button>
  `;
}

// STEP 4: TIME
function step4(){
  let t = "Please select your appointment time.";
  document.getElementById("text").innerText = t;
  speak(t);

  document.getElementById("ui").innerHTML = `
    <select id="time">
      <option value="10:00 AM">10:00 AM</option>
      <option value="11:30 AM">11:30 AM</option>
      <option value="2:00 PM">2:00 PM</option>
      <option value="4:00 PM">4:00 PM</option>
    </select>
    <button onclick="confirmBooking()">Confirm Appointment</button>
  `;
}

// FINAL CONFIRMATION (FIXED)
function confirmBooking(){
  let name = document.getElementById("name")?.value || "User";
  let phone = document.getElementById("phone")?.value || "N/A";
  let doctor = document.getElementById("doctor")?.value || "Doctor";
  let time = document.getElementById("time")?.value || "Time";

  clearInterval(interval);

  let t = "Your appointment is confirmed. Thank you.";
  document.getElementById("text").innerText = t;
  speak(t);

  document.getElementById("ui").innerHTML = `
    <div class="confirm">
      ✅ Appointment Confirmed<br><br>
      👤 Name: ${name}<br>
      📞 Phone: ${phone}<br>
      🩺 Doctor: ${doctor}<br>
      ⏰ Time: ${time}<br><br>
      ⏱ Call Duration: ${document.getElementById("timer").innerText}
    </div>
  `;
}
</script>

</body>
</html>
